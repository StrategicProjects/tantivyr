<?xml version="1.0" encoding="UTF-8"?>
<svg width="516" height="596" viewBox="0 0 516 596" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- hex border + fill -->
  <polygon points="258,11 500,150 500,446 258,585 16,446 16,150"
           fill="url(#bg)" stroke="#5eead4" stroke-width="14"/>

  <!-- stylized document / index lines (upper area) -->
  <g transform="translate(150,95)" stroke="#99f6e4" stroke-linecap="round">
    <line x1="0" y1="16"  x2="160" y2="16"  stroke-width="15" opacity="0.85"/>
    <line x1="0" y1="58"  x2="128" y2="58"  stroke-width="15" opacity="0.62"/>
    <line x1="0" y1="100" x2="160" y2="100" stroke-width="15" opacity="0.42"/>
    <line x1="0" y1="142" x2="96"  y2="142" stroke-width="15" opacity="0.28"/>
  </g>

  <!-- magnifying glass over the document -->
  <g transform="translate(262,258)">
    <circle cx="0" cy="0" r="80" fill="#5eead4" opacity="0.12"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#glass)" stroke-width="24"/>
    <line x1="58" y1="58" x2="120" y2="120" stroke="url(#glass)"
          stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- wordmark, centred in the wide middle band so it is never clipped -->
  <text x="258" y="455" text-anchor="middle" font-size="68" font-weight="700"
        fill="#f0fdfa" letter-spacing="0.5">tantivyr</text>
</svg>
