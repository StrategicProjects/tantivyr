# Watches crates.io for new releases of the key Rust dependencies and opens a
# tracking issue when the version pinned in src/rust/Cargo.lock falls behind the
# latest stable release. One issue per crate, no duplicates.
name: check-rust-deps.yaml

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [tantivy, extendr-api]
    steps:
      - uses: actions/checkout@v4

      - name: Check ${{ matrix.crate }} on crates.io
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CRATE: ${{ matrix.crate }}
        run: |
          set -euo pipefail

          # Version currently locked in the package (exact line "name = \"<crate>\"";
          # the closing quote keeps e.g. tantivy from matching tantivy-columnar).
          current="$(awk -v c="${CRATE}" \
            'index($0, "name = \"" c "\"")==1 {f=1} f&&/^version = /{gsub(/[",]/,""); print $3; exit}' \
            src/rust/Cargo.lock)"
          if [ -z "${current}" ]; then
            echo "Could not read the current ${CRATE} version from Cargo.lock." >&2
            exit 1
          fi

          # Latest stable version on crates.io (crates.io requires a User-Agent).
          latest="$(curl -sSL -H "User-Agent: tantivyr-update-check (github.com/${REPO})" \
            "https://crates.io/api/v1/crates/${CRATE}" | jq -r '.crate.max_stable_version')"

          echo "${CRATE}: current=${current}  latest=${latest}"

          # Validate the value from the network before using it anywhere.
          if ! printf '%s' "${latest}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Unexpected version string from crates.io: '${latest}'" >&2
            exit 1
          fi

          if [ "${current}" = "${latest}" ]; then
            echo "${CRATE} is up to date."
            exit 0
          fi

          newest="$(printf '%s\n%s\n' "${current}" "${latest}" | sort -V | tail -n1)"
          if [ "${newest}" = "${current}" ]; then
            echo "Locked version is newer than or equal to crates.io; nothing to do."
            exit 0
          fi

          title="Update ${CRATE} to ${latest}"

          # Avoid duplicates: bail out if an open issue with this title exists.
          existing="$(gh issue list --repo "${REPO}" --state open \
            --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "${existing}" != "0" ]; then
            echo "An open issue for ${CRATE} ${latest} already exists; skipping."
            exit 0
          fi

          # Ensure the label exists (idempotent).
          gh label create dependencies --repo "${REPO}" \
            --color 0366d6 --description "Dependency updates" --force || true

          body="$(cat <<EOF
          A newer stable release of [\`${CRATE}\`](https://crates.io/crates/${CRATE}) is available.

          | | version |
          |---|---|
          | currently pinned (\`src/rust/Cargo.lock\`) | \`${current}\` |
          | latest on crates.io | \`${latest}\` |

          ### Suggested steps
          1. Bump the dependency in \`src/rust/Cargo.toml\` if the minor/major changed.
          2. \`cargo update -p ${CRATE} --manifest-path src/rust/Cargo.toml\`
          3. Re-vendor crates: \`Rscript -e 'rextendr::vendor_pkgs()'\`
          4. Adjust the Rust bindings for any breaking API changes, then run
             \`rextendr::document()\`, \`devtools::test()\` and \`devtools::check()\`.
          5. Review the release notes at <https://crates.io/crates/${CRATE}/versions>
             and the docs at <https://docs.rs/${CRATE}>.

          _Opened automatically by the \`check-rust-deps\` workflow._
          EOF
          )"

          gh issue create --repo "${REPO}" \
            --title "${title}" \
            --label dependencies \
            --body "${body}"
          echo "Opened issue: ${title}"
