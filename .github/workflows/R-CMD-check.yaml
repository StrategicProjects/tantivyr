# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# with an added Rust toolchain step (the package compiles Rust via Cargo).
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Compile the bundled Rust (and its C deps, e.g. zstd) for exactly the macOS
      # deployment target R itself uses, so the objects match both R's link target
      # and libR.dylib. This avoids `ld` version-mismatch warnings (in either
      # direction) that would otherwise fail the check on macOS runners.
      - name: Align macOS deployment target with R
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mk="$(R RHOME)/etc/Makeconf"
          target="$(awk -F'= *' '/^MACOSX_DEPLOYMENT_TARGET/{print $2; exit}' "$mk" 2>/dev/null || true)"
          if [ -z "${target}" ]; then
            libR="$(R RHOME)/lib/libR.dylib"
            target="$(vtool -show-build "$libR" 2>/dev/null | awk '/minos/{print $2; exit}' || true)"
          fi
          if [ -n "${target}" ]; then
            echo "MACOSX_DEPLOYMENT_TARGET=${target}" >> "$GITHUB_ENV"
            echo "Using MACOSX_DEPLOYMENT_TARGET=${target}"
          else
            echo "Could not determine R's deployment target; leaving default."
          fi
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
